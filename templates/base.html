<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDT Invoice Hub - Hệ thống Quản lý Hóa đơn</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Pre-render check to prevent theme flicker
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
        window.activeTaxpayerMst = "{{ session.get('active_taxpayer_mst') or '' }}";
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <span class="logo-accent"><i class="bi bi-lightning-charge-fill"></i></span>
                <span class="logo-text">GDT Invoice Hub</span>
            </a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-4 d-none d-lg-flex">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/invoices' %}active{% endif %}" href="{{ url_for('invoices.invoices_page') }}"><i class="bi bi-receipt"></i> Tra cứu Hóa đơn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/issue-invoice' %}active{% endif %}" href="{{ url_for('invoices.issue_invoice_page') }}"><i class="bi bi-file-earmark-plus"></i> Phát hành Hóa đơn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/cashflow' %}active{% endif %}" href="{{ url_for('invoices.cashflow_page') }}"><i class="bi bi-graph-up-arrow"></i> Dự báo Dòng tiền</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                {% if logged_in %}
                <div class="navbar-mst-selector-wrapper">
                    <i class="bi bi-building"></i>
                    <select class="form-select form-select-sm" id="globalTaxpayerSelector">
                        <option value="">-- Tất cả doanh nghiệp --</option>
                    </select>
                </div>
                <span class="user-display d-none d-md-inline-block">
                    <span class="user-dot"></span>
                    Chào, <strong class="user-name">{{ session_username }}</strong>
                </span>
                <button class="btn btn-logout" id="globalLogoutButton" type="button">Đăng xuất</button>
                {% endif %}
                <button id="themeSwitcher" class="btn btn-theme-toggle" aria-label="Toggle theme">
                    <span class="theme-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="page-shell py-5">
        <div class="container">
            <div id="appAlertRegion" class="mb-4"></div>
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer py-3 text-center text-secondary small">
        <p class="mb-0">© 2026 GDT Invoice Hub • Nền tảng Tra cứu & Kết xuất Hóa đơn chuyên nghiệp.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sse_sync.js') }}"></script>
</body>
</html>
