<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDT Invoice Hub - Hệ thống Quản lý Hóa đơn</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Pre-render check to prevent theme flicker
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
        window.activeTaxpayerMst = "{{ session.get('active_taxpayer_mst') or '' }}";
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-xl border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <span class="logo-accent"><i class="bi bi-lightning-charge-fill" aria-hidden="true"></i></span>
                <span class="logo-text">GDT Invoice Hub</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-xl-0 ms-0 ms-xl-4">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/invoices' %}active{% endif %}" href="{{ url_for('invoices.invoices_page') }}"><i class="bi bi-receipt" aria-hidden="true"></i> Tra cứu Hóa đơn</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/issue-invoice' %}active{% endif %}" href="{{ url_for('invoices.issue_invoice_page') }}"><i class="bi bi-file-earmark-plus" aria-hidden="true"></i> Phát hành Hóa đơn</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/cashflow' %}active{% endif %}" href="{{ url_for('invoices.cashflow_page') }}"><i class="bi bi-graph-up-arrow" aria-hidden="true"></i> Dự báo Dòng tiền</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/harness' %}active{% endif %}" href="{{ url_for('invoices.harness_page') }}"><i class="bi bi-cpu-fill" aria-hidden="true"></i> Harness Agent</a>
                    </li>
                </ul>
                <div class="d-flex flex-column flex-xl-row align-items-start align-items-xl-center gap-3 ms-auto mt-2 mt-xl-0">
                    {% if logged_in %}
                    <div class="navbar-mst-selector-wrapper">
                        <i class="bi bi-building" aria-hidden="true"></i>
                        <select class="form-select form-select-sm" id="globalTaxpayerSelector" aria-label="Mã số thuế doanh nghiệp">
                            <option value="">-- Tất cả doanh nghiệp --</option>
                        </select>
                    </div>
                    <span class="user-display">
                        <span class="user-dot"></span>
                        Chào, <strong class="user-name">{{ session_username }}</strong>
                    </span>
                    <button class="btn btn-logout" id="globalLogoutButton" type="button">Đăng xuất</button>
                    {% endif %}
                    <button id="themeSwitcher" class="btn btn-theme-toggle" aria-label="Toggle theme">
                        <span class="theme-icon"></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-shell py-5">
        <div class="container">
            <div id="appAlertRegion" class="mb-4"></div>
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer py-3 text-center text-secondary small">
        <p class="mb-0">© 2026 GDT Invoice Hub • Nền tảng Tra cứu & Kết xuất Hóa đơn chuyên nghiệp.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sse_sync.js') }}"></script>
</body>
</html>
