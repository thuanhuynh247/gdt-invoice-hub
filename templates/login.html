{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <section class="card border-0 glass-card">
            <div class="card-body p-4 p-md-5">
                <p class="eyebrow mb-2">HỆ THỐNG AN NINH GDT</p>
                <h1 class="h3 mb-3">Đăng nhập Hệ thống Hóa đơn</h1>
                <p class="text-secondary mb-4">
                    Vui lòng nhập tài khoản để bắt đầu. Captcha được tải trực tiếp từ hệ thống hóa đơn của Cơ quan thuế, người dùng tự nhập để hoàn thành đăng nhập.
                </p>

                <form id="loginForm" class="vstack gap-3">
                    <div>
                        <label class="form-label fw-medium" for="username">Tên đăng nhập</label>
                        <input class="form-control custom-input" id="username" name="username" autocomplete="username" placeholder="Nhập tên tài khoản GDT…" required autofocus>
                    </div>
                    <div>
                        <label class="form-label fw-medium" for="password">Mật khẩu</label>
                        <div class="input-group">
                            <input class="form-control custom-input border-end-0" id="password" name="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu…" required>
                            <button class="btn btn-password-toggle border-start-0" type="button" id="togglePassword" aria-label="Hiện/Ẩn mật khẩu">
                                <i class="bi bi-eye" id="togglePasswordIcon" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="row g-3 align-items-end" id="captchaRow">
                        <div class="col-sm-7">
                            <label class="form-label fw-medium" for="captcha">Mã Captcha</label>
                            <input class="form-control custom-input" id="captcha" name="captcha" autocomplete="off" placeholder="Mã bảo mật…" required>
                        </div>
                        <div class="col-sm-5">
                            <div class="captcha-box" id="captchaBox">Đang tải captcha…</div>
                        </div>
                    </div>
                    <button class="btn btn-tertiary-outline w-100" id="refreshCaptchaButton" type="button">
                        <i class="bi bi-arrow-clockwise me-1" aria-hidden="true"></i> Tải lại Captcha
                    </button>
                    <button class="btn btn-primary-accent btn-lg w-100" id="loginSubmitButton" type="submit">
                        <span class="button-label">Đăng nhập</span>
                        <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
                    </button>
                </form>
            </div>
        </section>
    </div>
</div>
{% endblock %}
