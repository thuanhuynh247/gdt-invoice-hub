name: GDT Invoice Hub CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  TESTING: "True"
  GDT_USE_MOCK: "true"
  FLASK_SECRET_KEY: "ci-test-secret-key"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev pkg-config python3-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install onnxruntime
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Create runtime directories
      run: |
        mkdir -p instance data data/temp

    - name: Verify Python Syntax
      run: |
        python -m compileall -q app.py config.py run_local.py extensions.py

    - name: Run Backend Test Suite
      env:
        OPENBLAS_NUM_THREADS: "1"
        SQLALCHEMY_DATABASE_URI: "sqlite:///data/test_ci.db"
      run: |
        python -m pytest --ignore=tests/test_e2e_ui.py -v --tb=short -q 2>&1 | tail -40
